# Configuración para Smithery.ai
name: governagent
version: 1.0.0
description: "MCP Proxy with automatic HTTP 402 payments for SQL optimization and premium security auditing. Monetize your MCP server easily."

author: NoHumanHands
repository: https://github.com/NoHumanHands/governagent

commands:
  start:
    command: node
    args:
      - dist/index.js
    env:
      PORT: 3000

pricing:
  model: pay-per-use
  currency: USD
  tools:
    optimize-sql: 0.01
    security-audit: 0.50
    audit-logs: 0.05
    generate-report: 0.25

# Configuración del servidor remoto (Render)
deployment:
  type: remote
  url: https://governagent.onrender.com/sse
